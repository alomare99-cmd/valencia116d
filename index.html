<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCLX4Qv_p6n1IXomX_pCCmCSld08tmONZI",
    authDomain: "valencia116d.firebaseapp.com",
    projectId: "valencia116d",
    storageBucket: "valencia116d.firebasestorage.app",
    messagingSenderId: "1006323445862",
    appId: "1:1006323445862:web:26cc5e4f1a12498241fda7"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const REF = doc(db, "projects", "valencia116d");

  // expose to Babel/React world
  window._fbReady = false;
  window._fbData  = null;
  window._fbSave  = async (data) => {
    try {
      await setDoc(REF, { payload: JSON.stringify(data) });
      return true;
    } catch(e) { console.error("Save error", e); return false; }
  };
  window._fbSubscribe = (cb) => {
    return onSnapshot(REF, (snap) => {
      if (snap.exists()) {
        try { cb(JSON.parse(snap.data().payload)); } catch(e) { cb(null); }
      } else {
        cb(null); // first time, no data yet
      }
    });
  };
  window._fbReady = true;
  window.dispatchEvent(new Event("fb-ready"));
</script>

// ─── NAME EDITOR ─────────────────────────────────────────────────────────────
function NameEdit({id,name,canEdit,onSave}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(name);
  function commit(){ if(val.trim()) onSave(id,val.trim()); setEditing(false); }
  if(!canEdit||!editing) return <div style={{fontWeight:700,fontSize:13,color:T.hi,marginBottom:2,display:"flex",alignItems:"center",gap:5}}><span>{name}</span>{canEdit&&<span onClick={e=>{e.stopPropagation();setEditing(true);setVal(name);}} style={{fontSize:9,color:T.dim,cursor:"pointer",opacity:.5}}>✏️</span>}</div>;
  return <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}} onClick={e=>e.stopPropagation()} style={iStyle({fontSize:13,padding:"3px 7px",fontWeight:600,marginBottom:2})}/>;
}

// ─── LABOUR FORM ─────────────────────────────────────────────────────────────

// ─── MATERIAL FORM ────────────────────────────────────────────────────────────

        <select value={unit} onChange={e=>setUnit(e.target.value)} style={iStyle()}>{UNITS.map(u=><option key={u}>{u}</option>)}</select>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={iStyle()}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:10}}>
        <input type="number" value={qty} onChange={e=>setQty(e.target.value)} placeholder="Qty *" style={iStyle({color:type==="received"?T.green:T.red,fontWeight:600})}/>

      <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:14,padding:20}}>

            <div style={{height:6,background:T.border,borderRadius:99,overflow:"hidden",marginBottom:8}}><div style={{height:"100%",width:prog+"%",background:T.amber,borderRadius:99}}/></div>
            <input type="range" min={0} max={100} value={prog} onChange={e=>canEdit&&setProg(+e.target.value)} disabled={!canEdit} style={{marginBottom:12,accentColor:T.amber,opacity:canEdit?1:.5}}/>
            <div style={{fontSize:10,color:T.mid,letterSpacing:1,textTransform:"uppercase",marginBottom:6,fontWeight:600}}>Site Notes</div>
            <textarea value={notes} onChange={e=>canEdit&&setNotes(e.target.value)} readOnly={!canEdit} rows={4} placeholder={canEdit?"Issues, observations…":"View only — Omer can edit"} style={{...iStyle(),resize:"vertical",lineHeight:1.6,opacity:canEdit?1:.7}}/>
          </div>
        </div>
        <div style={{background:T.bg,border:"1px solid "+T.border,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:10,color:T.mid,letterSpacing:1,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>👷 Contractor / Vendor</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <input value={cName}  onChange={e=>canEdit&&setCName(e.target.value)}  readOnly={!canEdit} placeholder="Name"    style={iStyle({fontSize:12,opacity:canEdit?1:.7})}/>
            <input value={cPhone} onChange={e=>canEdit&&setCPhone(e.target.value)} readOnly={!canEdit} placeholder="Phone"   style={iStyle({fontSize:12,opacity:canEdit?1:.7})}/>
            <input value={cCo}    onChange={e=>canEdit&&setCCo(e.target.value)}    readOnly={!canEdit} placeholder="Company" style={iStyle({fontSize:12,opacity:canEdit?1:.7})}/>
          </div>
        </div>
        <div style={{background:T.bg,border:"1px solid #14532d66",borderRadius:12,padding:16,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:13,color:"#86efac",fontWeight:700}}>💳 PAYMENTS</div>
            <div style={{fontSize:11,color:T.mid}}>{(b.payments||[]).length} txns</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:b.total>0?10:14}}>
            {[{l:"Budget",v:b.total>0?fmt(b.total):"Not set",c:"#38bdf8"},{l:"Paid",v:fmt(b.paid),c:T.green},{l:"Remaining",v:b.total>0?fmt(b.total-b.paid):"—",c:T.amber},{l:"% Paid",v:b.total>0?pp+"%":"—",c:pp>=100?T.red:T.green}].map(x=>(
              <div key={x.l} style={{background:T.panel,borderRadius:8,padding:"8px 10px",textAlign:"center",border:"1px solid "+T.border}}>
                <div style={{fontSize:9,color:T.dim,textTransform:"uppercase",marginBottom:2}}>{x.l}</div>
                <div style={{fontSize:12,fontWeight:700,color:x.c}}>{x.v}</div>
              </div>
            ))}
          </div>
          {b.total>0&&<div style={{height:7,background:T.border,borderRadius:99,overflow:"hidden",marginBottom:14}}><div style={{height:"100%",width:pp+"%",background:pp>=100?"#ef4444":"#22c55e",borderRadius:99}}/></div>}
          {canEdit&&<><div style={{fontSize:10,color:T.mid,letterSpacing:1,textTransform:"uppercase",marginBottom:6,fontWeight:600}}>Budget Estimate (PKR)</div><input type="number" value={budget} onChange={e=>setBudget(e.target.value)} placeholder="Enter total budget…" style={iStyle({marginBottom:12})}/></>}
          {canAdd&&<div style={{borderTop:"1px solid "+T.border,paddingTop:12,marginBottom:12}}>
            <div style={{fontSize:10,color:T.mid,letterSpacing:1,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Record Payment</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <input type="number" value={pAmt}  onChange={e=>setPAmt(e.target.value)}  placeholder="Amount (PKR) *" style={iStyle({color:T.green,fontWeight:600})}/>
              <input type="date"   value={pDate} onChange={e=>setPDate(e.target.value)} style={iStyle()}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
              <select value={pMeth} onChange={e=>setPMeth(e.target.value)} style={iStyle()}>{METHODS.map(m=><option key={m}>{m}</option>)}</select>
              <select value={pType} onChange={e=>setPType(e.target.value)} style={iStyle()}>{["Payment","Advance","Retention","Labour","Material"].map(t=><option key={t}>{t}</option>)}</select>
              <input  value={pNote} onChange={e=>setPNote(e.target.value)} placeholder="Note…" style={iStyle()}/>
            </div>
            <button onClick={doPay} disabled={!pAmt||Number(pAmt)<=0} style={bStyle("#14532d","#86efac",{width:"100%",padding:"9px",opacity:!pAmt||Number(pAmt)<=0?.5:1})}>+ Record Payment</button>
          </div>}
          {(b.payments||[]).length>0&&<div style={{maxHeight:180,overflowY:"auto"}}>{(b.payments||[]).map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:T.panel,borderRadius:8,marginBottom:4,border:"1px solid "+T.border}}>
              <div><div style={{display:"flex",gap:5}}><span style={chip("#a78bfa")}>{p.type}</span><span style={chip("#64748b")}>{p.method}</span></div><div style={{fontSize:10,color:T.dim,marginTop:2}}>{p.date} · {p.by}{p.note?" · "+p.note:""}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:T.green,fontWeight:700}}>{fmt(p.amount)}</span>{canEdit&&<button onClick={()=>onDelPay(p.id)} style={bStyle("transparent",T.red,{padding:"2px 6px",fontSize:10,border:"1px solid "+T.red+"33"})}>✕</button>}</div>
            </div>
          ))}</div>}
        </div>
        <div style={{background:T.bg,border:"1px solid #1e3a5f",borderRadius:12,padding:16,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,color:"#93c5fd",fontWeight:700}}>📷 SITE PHOTOS</div>
            <span style={{fontSize:11,color:T.mid}}>{(s.photos||[]).length} photos</span>
          </div>
          {canAdd&&<div style={{display:"flex",gap:8,marginBottom:12}}>
            <input value={cap} onChange={e=>setCap(e.target.value)} placeholder="Caption…" style={iStyle({flex:1})}/>
            <button onClick={()=>fRef.current?.click()} style={bStyle("#1e3a8a","#93c5fd",{whiteSpace:"nowrap"})}>📁 Upload</button>
            <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={doPhoto}/>
          </div>}
          {(s.photos||[]).length===0?<div style={{textAlign:"center",padding:"14px 0",color:T.dim,fontSize:12}}>No photos yet.</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
              {(s.photos||[]).map(p=>(
                <div key={p.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid "+T.border,cursor:"pointer"}} onClick={()=>setLb(p)}>
                  <img src={p.data} alt={p.caption} style={{width:"100%",height:90,objectFit:"cover",display:"block"}}/>
                  <div style={{padding:"5px 7px",background:T.panel}}><div style={{fontSize:9,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.caption}</div><div style={{fontSize:8,color:T.dim}}>{p.by} · {p.size}</div></div>
                  {canEdit&&<button onClick={e=>{e.stopPropagation();onDelPhoto(p.id);}} style={{position:"absolute",top:4,right:4,background:"#000b",border:"none",borderRadius:99,width:20,height:20,color:"#fff",fontSize:10,cursor:"pointer"}}>✕</button>}
                </div>
              ))}
            </div>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {canEdit?<button onClick={doSave} style={bStyle("#1d4ed8")}>💾 Save Changes</button>:<div style={{fontSize:12,color:T.dim,padding:"8px 12px",background:T.bg,borderRadius:8,border:"1px solid "+T.border}}>🔒 View only — Omer can edit</div>}
          <button onClick={doAI} disabled={aiLd} style={bStyle("#7c1d1d","#fca5a5",{opacity:aiLd?.7:1})}>{aiLd?"Analyzing…":"🤖 AI Advisor"}</button>
          <button onClick={onBack} style={bStyle(T.border,T.mid)}>← Back</button>
        </div>
        {(aiLd||aiTxt)&&<div style={{background:"#0a0d14",border:"1px solid #7c1d1d44",borderRadius:10,padding:14,marginBottom:14}}>
          <div style={{fontSize:10,color:"#fb923c",letterSpacing:1,textTransform:"uppercase",marginBottom:6,fontWeight:600}}>🤖 AI Advisor</div>
          {aiLd?<div style={{color:T.dim,fontSize:12}}>Analyzing…</div>:<div style={{fontSize:13,color:T.text,lineHeight:1.85,whiteSpace:"pre-wrap"}}>{aiTxt}</div>}
        </div>}
        {(s.history||[]).length>0&&<div>
          <div style={{fontSize:10,color:T.mid,letterSpacing:1,textTransform:"uppercase",marginBottom:6,fontWeight:600}}>Update History</div>
          <div style={{maxHeight:160,overflowY:"auto"}}>{(s.history||[]).map((h,i)=>(
            <div key={i} style={{borderLeft:"2px solid "+T.border,paddingLeft:10,marginBottom:7}}>
              <div style={{fontSize:10,color:T.dim}}>{h.time} · <span style={{color:USERS.find(u=>u.name===h.who)?.color||T.mid}}>{h.who}</span> · <span style={{color:STATUS[h.status]?.color}}>{STATUS[h.status]?.label}</span> · {h.prog}%</div>
              {h.note&&<div style={{fontSize:11,color:"#1e3a5f",marginTop:1}}>{h.note}</div>}
            </div>
          ))}</div>
        </div>}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// ROOT
// ════════════════════════════════════════════════════════════════════════════
function Root(){
  // ── firebase state ────────────────────────────────────────────────────────
  const [fbReady, setFbReady] = useState(false);
  const [syncing, setSyncing] = useState(true); // loading from firebase

  // ── auth ──────────────────────────────────────────────────────────────────
  const [user,    setUser]    = useState(null);
  const [pinSel,  setPinSel]  = useState(null);
  const [pinVal,  setPinVal]  = useState("");
  const [pinErr,  setPinErr]  = useState("");

  // ── app data ──────────────────────────────────────────────────────────────
  const [data, setData] = useState(mkData);

  // ── ui ────────────────────────────────────────────────────────────────────
  const [page,    setPage]    = useState("dashboard");
  const [tid,     setTid]     = useState(null);
  const [payTab,  setPayTab]  = useState("task");
  const [payFilt, setPayFilt] = useState("All");
  const [matFilt, setMatFilt] = useState("All");
  const [fl,      setFl]      = useState("All");
  const [cat,     setCat]     = useState("All");
  const [stFilt,  setStFilt]  = useState("All");
  const [srch,    setSrch]    = useState("");
  const [saveMsg, setSaveMsg] = useState("");
  const [brief,   setBrief]   = useState("");
  const [briefLd, setBriefLd] = useState(false);

  // ── wait for firebase then subscribe ──────────────────────────────────────
  useEffect(()=>{
    function init(){
      setFbReady(true);
      // subscribe to real-time updates
      const unsub = window._fbSubscribe(incoming=>{
        if(incoming){
          // merge incoming with default to handle new tasks added in future updates
          setData(prev=>{
            const merged = {...mkData(),...incoming};
            // make sure all tasks exist
            TASKS.forEach(t=>{ if(!merged.tasks[t.id]) merged.tasks[t.id]=mkData().tasks[t.id]; if(!merged.names[t.id]) merged.names[t.id]=t.name; });
            return merged;
          });
        }
        setSyncing(false);
      });
      return unsub;
    }
    if(window._fbReady){
      const unsub=init(); return ()=>unsub&&unsub();
    } else {
      window.addEventListener("fb-ready",()=>{ init(); },{once:true});
    }
  },[]);

  // ── save to firebase ──────────────────────────────────────────────────────
  const fbSave = useCallback(async(newData)=>{
    const ok = await window._fbSave(newData);
    setSaveMsg(ok?"✓ Saved to cloud":"⚠ Save failed");
    setTimeout(()=>setSaveMsg(""),2500);
  },[]);

  // ── mutate + save ─────────────────────────────────────────────────────────
  const mut = useCallback(fn=>{
    setData(prev=>{
      const next=fn(prev);
      fbSave(next);
      return next;
    });
  },[fbSave]);

  // ── log (takes user obj directly) ─────────────────────────────────────────
  function addLog(u,action,detail){
    const entry={id:Date.now(),time:ts(),who:u.name,wid:u.id,action,detail:detail||""};
    mut(prev=>({...prev,log:[entry,...(prev.log||[]).slice(0,199)]}));
  }

  // ── login ─────────────────────────────────────────────────────────────────
  function selectUser(u){
    if(u.pin===null){
      setUser(u);
      setPage("dashboard");
      // log directly without state dependency
      const entry={id:Date.now(),time:ts(),who:u.name,wid:u.id,action:"Login",detail:u.name+" in"};
      mut(prev=>({...prev,log:[entry,...(prev.log||[]).slice(0,199)]}));
    } else {
      setPinSel(u); setPinVal(""); setPinErr("");
    }
  }

  function tryPin(){
    if(!pinSel) return;
    if(pinVal===pinSel.pin){
      const u=pinSel;
      setUser(u);
      setPage(u.perm==="payments_only"?"payments":"dashboard");
      setPinSel(null); setPinVal("");
      const entry={id:Date.now(),time:ts(),who:u.name,wid:u.id,action:"Login",detail:u.name+" in"};
      mut(prev=>({...prev,log:[entry,...(prev.log||[]).slice(0,199)]}));
    } else {
      setPinErr("Incorrect PIN"); setPinVal("");
    }
  }

  function logout(){ setUser(null); setPinSel(null); setPinVal(""); setPinErr(""); setPage("dashboard"); }

  // ── loading / syncing screen ──────────────────────────────────────────────
  if(syncing){
    return(
      <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
        <div style={{fontSize:48}}>🏡</div>
        <div style={{fontSize:18,color:T.hi,fontWeight:700}}>Valencia 116-D</div>
        <div style={{fontSize:13,color:T.mid}}>Connecting to database…</div>
        <div style={{width:48,height:48,border:"4px solid "+T.border,borderTopColor:"#a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  // ── login screen ──────────────────────────────────────────────────────────
  if(!user){
    return(
      <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:18,padding:40,width:340,textAlign:"center",boxShadow:"0 24px 64px #00000088"}}>
          <div style={{fontSize:48,marginBottom:10}}>🏡</div>
          <div style={{fontSize:20,color:T.hi,fontWeight:700,marginBottom:4}}>Valencia 116-D</div>
          <div style={{fontSize:12,color:T.mid,marginBottom:4}}>{PROJECT.name}</div>
          <div style={{fontSize:11,color:T.dim,marginBottom:28}}>{PROJECT.plotSize} · {PROJECT.totalArea}</div>
          {!pinSel?(
            <>
              <div style={{fontSize:11,color:T.mid,marginBottom:14,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Select Profile</div>
              {USERS.map(u=>(
                <button key={u.id} onClick={()=>selectUser(u)}
                  style={{width:"100%",marginBottom:10,padding:"14px 16px",textAlign:"left",display:"flex",alignItems:"center",gap:14,border:"1px solid "+T.border,borderRadius:12,background:T.border,cursor:"pointer",fontFamily:"inherit"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=u.color;e.currentTarget.style.background=u.color+"22";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.background=T.border;}}>
                  <span style={{fontSize:26}}>{u.icon}</span>
                  <div style={{flex:1,textAlign:"left"}}><div style={{fontSize:14,color:T.hi,fontWeight:600}}>{u.name}</div><div style={{fontSize:11,color:u.color,marginTop:2}}>{u.role}</div></div>
                  <span style={{fontSize:12,color:T.dim}}>{u.pin?"🔒":"→"}</span>
                </button>
              ))}
            </>
          ):(
            <>
              <div style={{fontSize:28,marginBottom:6}}>{pinSel.icon}</div>
              <div style={{fontSize:15,color:T.hi,fontWeight:600,marginBottom:2}}>{pinSel.name}</div>
              <div style={{fontSize:11,color:pinSel.color,marginBottom:20}}>{pinSel.role}</div>
              <div style={{fontSize:10,color:T.mid,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Enter PIN</div>
              <input type="password" value={pinVal} maxLength={6} autoFocus onChange={e=>setPinVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryPin()} placeholder="••••" style={iStyle({textAlign:"center",fontSize:24,letterSpacing:10,marginBottom:8,padding:"12px"})}/>
              {pinErr&&<div style={{fontSize:11,color:T.red,marginBottom:8}}>{pinErr}</div>}
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <button onClick={()=>setPinSel(null)} style={bStyle(T.border,T.mid,{flex:1})}>← Back</button>
                <button onClick={tryPin} style={bStyle(pinSel.color,"#000",{flex:1,fontWeight:700})}>Login</button>
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // ── derived ───────────────────────────────────────────────────────────────
  const canEdit  = user.perm==="all";
  const isOffice = user.perm==="payments_only";
  const totBudget= Object.values(data.tasks).reduce((s,t)=>s+(t.budget.total||0),0);
  const totPaid  = Object.values(data.tasks).reduce((s,t)=>s+(t.budget.paid||0),0);
  const totLabour= (data.labour||[]).reduce((s,l)=>s+l.amount,0);
  const totProg  = Math.round(Object.values(data.tasks).reduce((s,t)=>s+t.progress,0)/TASKS.length);
  const cnts={done:0,active:0,blocked:0};
  Object.values(data.tasks).forEach(t=>{ if(t.status==="completed")cnts.done++; else if(t.status==="in-progress")cnts.active++; else if(t.status==="blocked")cnts.blocked++; });
  const allPays=TASKS.flatMap(t=>(data.tasks[t.id].budget.payments||[]).map(p=>({...p,tid:t.id,tname:data.names[t.id],ticon:t.icon}))).sort((a,b)=>b.id-a.id);
  const matStock=useMemo(()=>{ const m={}; (data.mats||[]).forEach(x=>{ if(!m[x.name]) m[x.name]={name:x.name,unit:x.unit,in:0,out:0,val:0}; if(x.type==="received"){m[x.name].in+=x.qty;m[x.name].val+=x.qty*(x.rate||0);}else m[x.name].out+=x.qty; }); return Object.values(m).map(x=>({...x,bal:x.in-x.out})); },[data.mats]);
  const visTasks=TASKS.filter(t=>{ if(fl!=="All"&&!t.floors.includes(fl)) return false; if(cat!=="All"&&t.cat!==cat) return false; if(stFilt!=="All"&&data.tasks[t.id].status!==stFilt) return false; if(srch&&!(data.names[t.id]||"").toLowerCase().includes(srch.toLowerCase())) return false; return true; });
  const activeTask=tid?TASKS.find(t=>t.id===tid):null;

  // ── mutations ─────────────────────────────────────────────────────────────
  function saveTask(id,d){
    const now=ts();
    mut(prev=>({...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],status:d.status,progress:d.prog,notes:d.notes,updatedBy:user.name,updatedAt:now,budget:{...prev.tasks[id].budget,total:d.budget},contractor:d.contractor,history:[{time:now,who:user.name,status:d.status,prog:d.prog,note:d.notes},...(prev.tasks[id].history||[]).slice(0,19)]}}}));
    addLog(user,"Task Updated",data.names[id]+" → "+d.status+" "+d.prog+"%");
    setPage("dashboard");
  }
  function addPay(id,p){ mut(prev=>{ const b=prev.tasks[id].budget; const pays=[{id:Date.now(),...p,by:user.name,at:ts()},...(b.payments||[])]; return{...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],budget:{...b,paid:pays.reduce((s,x)=>s+x.amount,0),payments:pays}}}}; }); addLog(user,"Payment","PKR"+fmtM(p.amount)+" "+data.names[id]); }
  function delPay(tid,pid){ if(!canEdit) return; mut(prev=>{ const b=prev.tasks[tid].budget; const pays=(b.payments||[]).filter(p=>p.id!==pid); return{...prev,tasks:{...prev.tasks,[tid]:{...prev.tasks[tid],budget:{...b,paid:pays.reduce((s,p)=>s+p.amount,0),payments:pays}}}}; }); }
  function addPhoto(id,p){ mut(prev=>({...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],photos:[{id:Date.now(),...p,by:user.name,at:ts()},...(prev.tasks[id].photos||[])]}}})); addLog(user,"Photo Added",data.names[id]); }
  function delPhoto(id,pid){ if(!canEdit) return; mut(prev=>({...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],photos:(prev.tasks[id].photos||[]).filter(p=>p.id!==pid)}}})); }
  function saveName(id,name){ if(!canEdit) return; mut(prev=>({...prev,names:{...prev.names,[id]:name}})); addLog(user,"Renamed","→ "+name); }
  function addLabour(l){ mut(prev=>({...prev,labour:[{id:Date.now(),...l,by:user.name,at:ts()},...(prev.labour||[])]})); addLog(user,"Labour","PKR"+fmtM(l.amount)+" "+l.work); }
  function delLabour(id){ if(!canEdit) return; mut(prev=>({...prev,labour:(prev.labour||[]).filter(l=>l.id!==id)})); }
  function addMat(m){ mut(prev=>({...prev,mats:[{id:Date.now(),...m,by:user.name,at:ts()},...(prev.mats||[])]})); addLog(user,"Material "+m.type,m.qty+" "+m.unit+" "+m.name); }
  function delMat(id){ if(!canEdit) return; mut(prev=>({...prev,mats:(prev.mats||[]).filter(m=>m.id!==id)})); }

  async function getBrief(){
    setBrief(""); setBriefLd(true); setPage("briefing");
    const sum=TASKS.map(t=>{ const s=data.tasks[t.id],b=s.budget; return data.names[t.id]+"["+t.priority+"]:"+s.status+"("+s.progress+"%)B:"+fmtM(b.total)+"P:"+fmtM(b.paid); }).join("\n");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,system:"Senior construction PM briefing for luxury home in Lahore. Structured, emoji-rich, actionable.",messages:[{role:"user",content:"Project: "+PROJECT.name+"\nBudget:PKR"+fmtM(totBudget)+" Paid:PKR"+fmtM(totPaid)+" Labour:PKR"+fmtM(totLabour)+"\n\n"+sum+"\n\nDeliver: 1.📊 Health 2.🔴 Urgent 3.✅ Top 3 TODAY 4.💰 Finance 5.📅 Timeline"}]})});

            {byStatus.map(s=>(<div key={s.label} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:s.color}}>{s.label}</span><span style={{color:T.mid}}>{s.count}</span></div><div style={{height:7,background:T.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:(s.count/TASKS.length*100)+"%",background:s.color,borderRadius:99}}/></div></div>))}
          </div>
          <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,padding:16}}>
            <div style={{fontSize:13,color:T.text,fontWeight:600,marginBottom:12}}>Budget by Category</div>
            {byCat.map(c=>{ const pct=c.budget>0?Math.round(c.paid/c.budget*100):0; return(<div key={c.cat} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:c.color}}>{c.cat} ({c.tasks.length})</span><span style={{color:T.mid}}>PKR {fmtM(c.budget)} · {pct}%</span></div><div style={{height:6,background:c.color+"33",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:c.color,borderRadius:99}}/></div></div>); })}
          </div>
        </div>
        <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid "+T.border}}><span style={{fontSize:12,color:T.text,fontWeight:600}}>Category Progress Matrix</span></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 55px 80px 110px 110px 110px",padding:"6px 16px",borderBottom:"1px solid "+T.border,background:T.bg}}>{["Category","Tasks","Work%","Budget","Paid","Remaining"].map(h=><div key={h} style={{fontSize:9,color:T.dim,textTransform:"uppercase",letterSpacing:1}}>{h}</div>)}</div>
          {byCat.map((c,i)=>(<div key={c.cat} style={{display:"grid",gridTemplateColumns:"1fr 55px 80px 110px 110px 110px",padding:"9px 16px",borderBottom:i<byCat.length-1?"1px solid "+T.bg:"none",background:i%2===0?T.bg:T.panel,alignItems:"center"}}><span style={{fontSize:12,color:T.text}}>{c.cat}</span><span style={{fontSize:12,color:T.mid}}>{c.tasks.length}</span><div><div style={{fontSize:12,color:T.amber,marginBottom:1}}>{c.prog}%</div><div style={{height:3,background:T.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:c.prog+"%",background:T.amber,borderRadius:99}}/></div></div><span style={{fontSize:12,color:c.budget>0?"#38bdf8":T.dim}}>{c.budget>0?"PKR "+fmtM(c.budget):"—"}</span><span style={{fontSize:12,color:T.green}}>PKR {fmtM(c.paid)}</span><span style={{fontSize:12,color:c.budget>0?T.amber:T.dim}}>{c.budget>0?"PKR "+fmtM(c.budget-c.paid):"—"}</span></div>))}
        </div>
      </div>
    );
  }

  // ─── LOG ──────────────────────────────────────────────────────────────────
  function Log(){
    return(
      <div style={{maxWidth:720,margin:"0 auto",padding:16}}>
        <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 18px",borderBottom:"1px solid "+T.border,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:T.text,fontWeight:600}}>📜 Activity Log</span><span style={{fontSize:11,color:T.dim}}>{(data.log||[]).length} entries</span></div>
          {(data.log||[]).length===0&&<div style={{padding:36,textAlign:"center",color:T.dim,fontSize:13}}>No activity yet.</div>}
          {(data.log||[]).map((e,i)=>{ const u=USERS.find(u=>u.id===e.wid)||{color:T.mid,icon:"👤"}; return(<div key={e.id} style={{display:"flex",gap:10,padding:"10px 18px",borderBottom:i<(data.log||[]).length-1?"1px solid "+T.bg:"none",background:i%2===0?T.bg:T.panel}}><span style={{fontSize:14,marginTop:2}}>{u.icon}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}><span style={{fontSize:12,color:u.color,fontWeight:600}}>{e.who}</span><span style={{fontSize:10,color:T.dim}}>{e.time}</span></div><div style={{fontSize:12,color:T.text,marginTop:1}}><span style={{color:T.amber}}>{e.action}</span>{e.detail?" — "+e.detail:""}</div></div></div>); })}
        </div>
      </div>
    );
  }

  // ─── BRIEFING ─────────────────────────────────────────────────────────────
  function Briefing(){
    return(
      <div style={{maxWidth:680,margin:"0 auto",padding:16}}>
        <div style={{background:T.panel,border:"1px solid #7c1d1d33",borderRadius:14,padding:24}}>
          <div style={{fontSize:10,color:"#fb923c",letterSpacing:2,textTransform:"uppercase",marginBottom:4,fontWeight:600}}>🤖 AI Daily Briefing</div>
          <div style={{fontSize:18,color:T.hi,fontWeight:700,marginBottom:3}}>Construction Report</div>
          <div style={{fontSize:11,color:T.dim,marginBottom:16}}>{PROJECT.name}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>{[{l:"Budget",v:fmt(totBudget),c:"#38bdf8"},{l:"Paid",v:fmt(totPaid),c:T.green},{l:"Labour",v:fmt(totLabour),c:"#fb923c"},{l:"Progress",v:totProg+"%",c:T.purple}].map(x=>(<div key={x.l} style={{background:T.bg,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10,color:T.dim,marginBottom:2,textTransform:"uppercase"}}>{x.l}</div><div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div></div>))}</div>
          {briefLd?<div style={{textAlign:"center",padding:"24px 0",color:T.dim}}><div style={{fontSize:32,marginBottom:8}}>🏗️</div><div>Analyzing…</div></div>:<div style={{fontSize:13,color:T.text,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{brief||"Click 'AI' in nav to generate report."}</div>}
        </div>
      </div>
    );
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'Segoe UI',Arial,sans-serif"}}>
      <Nav/>
      {page==="dashboard" && <Dashboard/>}
      {page==="task" && activeTask && (
        <TaskPage key={tid} task={activeTask} name={data.names[tid]} taskData={data.tasks[tid]}
          perm={user.perm} canEdit={canEdit}
          onSave={d=>saveTask(tid,d)} onBack={()=>setPage("dashboard")}
          onAddPay={p=>addPay(tid,p)} onDelPay={pid=>delPay(tid,pid)}
          onAddPhoto={p=>addPhoto(tid,p)} onDelPhoto={pid=>delPhoto(tid,pid)}/>
      )}
      {page==="payments"  && <Payments/>}
      {page==="analytics" && <Analytics/>}
      {page==="log"       && <Log/>}
      {page==="briefing"  && <Briefing/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
