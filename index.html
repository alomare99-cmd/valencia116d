const JURL = "https://api.jsonbin.io/v3/b";
let BIN_ID = localStorage.getItem("vlc_bin_id") || null;

async function dbLoad(){
  try{
    if(!BIN_ID){
      const r=await fetch(JURL,{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":JKEY,"X-Bin-Name":"valencia116d"},body:JSON.stringify({_init:true})});
      const d=await r.json();
      BIN_ID=d.metadata?.id||null;
      if(BIN_ID) localStorage.setItem("vlc_bin_id",BIN_ID);
      return null;
    }
    const r=await fetch(JURL+"/"+BIN_ID+"/latest",{headers:{"X-Master-Key":JKEY}});
    const d=await r.json();
    if(d.record?._init) return null;
    return d.record||null;
  }catch(e){console.error(e);return null;}
}
async function dbSave(data){
  try{
    if(!BIN_ID) return false;
    const r=await fetch(JURL+"/"+BIN_ID,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JKEY},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){console.error(e);return false;}
}

/* ── DEFAULT DATA ── */
function mkData(){
  return{
    names: TASKS.reduce((a,t)=>({...a,[t.id]:t.name}),{}),
    tasks: TASKS.reduce((a,t)=>({...a,[t.id]:{status:"not-started",progress:0,notes:"",updatedBy:null,history:[],budget:{total:0,paid:0,payments:[]},contractor:{name:"",phone:"",co:""},photos:[]}}),{}),
    labour:[],mats:[],log:[],
  };
}
function mergeData(saved){
  const base=mkData();
  if(!saved) return base;
  const merged={...base,...saved};
  TASKS.forEach(t=>{
    if(!merged.tasks[t.id]) merged.tasks[t.id]=base.tasks[t.id];
    if(!merged.names[t.id]) merged.names[t.id]=t.name;
  });
  return merged;
}

    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>

function NameEdit({id,name,canEdit,onSave}){
  const [e,setE]=useState(false);
  const [v,setV]=useState(name);
  const commit=()=>{ if(v.trim()) onSave(id,v.trim()); setE(false); };
  if(!canEdit||!e) return <div style={{fontWeight:700,fontSize:13,color:T.hi,marginBottom:2,display:"flex",alignItems:"center",gap:5}}><span>{name}</span>{canEdit&&<span onClick={ev=>{ev.stopPropagation();setE(true);setV(name);}} style={{fontSize:9,color:T.dim,cursor:"pointer",opacity:.5}}>✏️</span>}</div>;
  return <input autoFocus value={v} onChange={ev=>setV(ev.target.value)} onBlur={commit} onKeyDown={ev=>{if(ev.key==="Enter")commit();if(ev.key==="Escape")setE(false);}} onClick={ev=>ev.stopPropagation()} style={IS({fontSize:13,padding:"3px 7px",fontWeight:600,marginBottom:2})}/>;
}

function TaskPage({task,name,td,perm,canEdit,onSave,onBack,onAddPay,onDelPay,onAddPhoto,onDelPhoto}){

    setAiLd(true); setAi("");

      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,system:"Senior construction PM Lahore. Concise bullets.",messages:[{role:"user",content:"Task:"+name+" ["+task.priority+"] "+task.ref+"\nStatus:"+td.status+" "+td.progress+"%\nBudget:PKR"+fmtM(b.total)+" Paid:PKR"+fmtM(b.paid)+"\n\n1.⚡ Actions 2.🔍 Checks 3.💰 Budget 4.⏱ Timeline 5.🔗 Dependencies"}]})});

      {lb&&<div onClick={()=>setLb(null)} style={{position:"fixed",inset:0,background:"#000c",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

          <img src={lb.data} alt={lb.caption} style={{width:"100%",maxHeight:"70vh",objectFit:"contain",display:"block"}}/>
          <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between"}}>
            <div><div style={{fontSize:13,color:T.hi}}>{lb.caption}</div><div style={{fontSize:10,color:T.dim}}>{lb.by} · {lb.size}</div></div>
            <button onClick={()=>setLb(null)} style={BS(T.border,T.mid,{fontSize:11})}>✕ Close</button>
          </div>
        </div>
      </div>}
      <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:14,padding:20}}>
        {/* header */}
        <div style={{display:"flex",gap:12,marginBottom:14,paddingBottom:12,borderBottom:"1px solid "+T.border}}>
          <span style={{fontSize:32}}>{task.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:17,color:T.hi,fontWeight:700,marginBottom:2}}>{name}</div>
            <div style={{fontSize:11,color:T.dim,marginBottom:5}}>{task.cat} · {task.ref}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{task.floors.map(f=><span key={f} style={CH("#38bdf8")}>{f}</span>)}<span style={CH(PRICLR[task.priority])}>{task.priority}</span>{td.updatedBy&&<span style={{fontSize:10,color:T.dim}}>· {td.updatedBy}</span>}</div>
          </div>
        </div>
        {/* specs */}
        <div style={{background:T.bg,border:"1px solid "+T.border,borderRadius:10,padding:"10px 14px",marginBottom:14}}>
          {LB("Specifications")}
          {task.details.map((d,i)=><div key={i} style={{fontSize:12,color:T.dim,lineHeight:1.7}}>• {d}</div>)}
          <div style={{marginTop:7,paddingTop:7,borderTop:"1px solid "+T.border,fontSize:11,color:"#334155"}}>📐 {task.scope}</div>
        </div>
        {/* status + progress */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            {LB("Status")}
            {Object.entries(STATUS).map(([k,v])=>(
              <button key={k} onClick={()=>canEdit&&setSt(k)} style={{background:st===k?v.color+"22":"transparent",color:st===k?v.color:T.mid,border:"1px solid "+(st===k?v.color:T.border),borderRadius:8,fontSize:12,display:"block",width:"100%",textAlign:"left",marginBottom:4,padding:"7px 10px",cursor:canEdit?"pointer":"default",opacity:canEdit?1:.65,fontFamily:"inherit",fontWeight:500}}>{v.label}</button>
            ))}
          </div>
          <div>
            {LB("Progress — "+pr+"%")}
            <div style={{height:6,background:T.border,borderRadius:99,overflow:"hidden",marginBottom:8}}><div style={{height:"100%",width:pr+"%",background:T.amber,borderRadius:99}}/></div>
            <input type="range" min={0} max={100} value={pr} onChange={e=>canEdit&&setPr(+e.target.value)} disabled={!canEdit} style={{marginBottom:12,accentColor:T.amber,opacity:canEdit?1:.5}}/>
            {LB("Site Notes")}
            <textarea value={nt} onChange={e=>canEdit&&setNt(e.target.value)} readOnly={!canEdit} rows={4} placeholder={canEdit?"Issues, observations…":"View only — Omer can edit"} style={{...IS(),resize:"vertical",lineHeight:1.6,opacity:canEdit?1:.7}}/>
          </div>
        </div>
        {/* contractor */}
        <div style={{background:T.bg,border:"1px solid "+T.border,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          {LB("👷 Contractor / Vendor")}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <input value={cn} onChange={e=>canEdit&&setCn(e.target.value)} readOnly={!canEdit} placeholder="Name"    style={IS({fontSize:12,opacity:canEdit?1:.7})}/>
            <input value={cp} onChange={e=>canEdit&&setCp(e.target.value)} readOnly={!canEdit} placeholder="Phone"   style={IS({fontSize:12,opacity:canEdit?1:.7})}/>
            <input value={cc} onChange={e=>canEdit&&setCc(e.target.value)} readOnly={!canEdit} placeholder="Company" style={IS({fontSize:12,opacity:canEdit?1:.7})}/>
          </div>
        </div>
        {/* payments */}
        <div style={{background:T.bg,border:"1px solid #14532d66",borderRadius:12,padding:16,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={{fontSize:13,color:"#86efac",fontWeight:700}}>💳 PAYMENTS</div><div style={{fontSize:11,color:T.mid}}>{(b.payments||[]).length} txns</div></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:b.total>0?10:14}}>
            {[{l:"Budget",v:b.total>0?fmt(b.total):"Not set",c:"#38bdf8"},{l:"Paid",v:fmt(b.paid),c:T.green},{l:"Remaining",v:b.total>0?fmt(b.total-b.paid):"—",c:T.amber},{l:"% Paid",v:b.total>0?pp+"%":"—",c:pp>=100?T.red:T.green}].map(x=>(<div key={x.l} style={{background:T.panel,borderRadius:8,padding:"8px 10px",textAlign:"center",border:"1px solid "+T.border}}><div style={{fontSize:9,color:T.dim,textTransform:"uppercase",marginBottom:2}}>{x.l}</div><div style={{fontSize:12,fontWeight:700,color:x.c}}>{x.v}</div></div>))}
          </div>
          {b.total>0&&<div style={{height:7,background:T.border,borderRadius:99,overflow:"hidden",marginBottom:14}}><div style={{height:"100%",width:pp+"%",background:pp>=100?"#ef4444":"#22c55e",borderRadius:99}}/></div>}
          {canEdit&&<>{LB("Budget Estimate (PKR)")}<input type="number" value={bg} onChange={e=>setBg(e.target.value)} placeholder="Enter total budget…" style={IS({marginBottom:12})}/></>}
          {canAdd&&<div style={{borderTop:"1px solid "+T.border,paddingTop:12,marginBottom:12}}>
            {LB("Record Payment")}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <input type="number" value={pa} onChange={e=>setPa(e.target.value)} placeholder="Amount (PKR) *" style={IS({color:T.green,fontWeight:600})}/>
              <input type="date"   value={pd} onChange={e=>setPd(e.target.value)} style={IS()}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
              <select value={pm} onChange={e=>setPm(e.target.value)} style={IS()}>{METHODS.map(x=><option key={x}>{x}</option>)}</select>
              <select value={pt} onChange={e=>setPt(e.target.value)} style={IS()}>{["Payment","Advance","Retention","Labour","Material"].map(x=><option key={x}>{x}</option>)}</select>
              <input  value={pn} onChange={e=>setPn(e.target.value)} placeholder="Note…" style={IS()}/>
            </div>
            <button onClick={doPay} disabled={!pa||Number(pa)<=0} style={BS("#14532d","#86efac",{width:"100%",padding:"9px",opacity:!pa||Number(pa)<=0?.5:1})}>+ Record Payment</button>
          </div>}
          {(b.payments||[]).length>0&&<div style={{maxHeight:180,overflowY:"auto"}}>{(b.payments||[]).map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:T.panel,borderRadius:8,marginBottom:4,border:"1px solid "+T.border}}>
            <div><div style={{display:"flex",gap:5}}><span style={CH("#a78bfa")}>{p.type}</span><span style={CH("#64748b")}>{p.method}</span></div><div style={{fontSize:10,color:T.dim,marginTop:2}}>{p.date} · {p.by}{p.note?" · "+p.note:""}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:T.green,fontWeight:700}}>{fmt(p.amount)}</span>{canEdit&&<button onClick={()=>onDelPay(p.id)} style={BS("transparent",T.red,{padding:"2px 6px",fontSize:10,border:"1px solid "+T.red+"33"})}>✕</button>}</div>
          </div>))}</div>}
        </div>
        {/* photos */}
        <div style={{background:T.bg,border:"1px solid #1e3a5f",borderRadius:12,padding:16,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:13,color:"#93c5fd",fontWeight:700}}>📷 SITE PHOTOS</div><span style={{fontSize:11,color:T.mid}}>{(td.photos||[]).length} photos</span></div>
          {canAdd&&<div style={{display:"flex",gap:8,marginBottom:12}}><input value={cap} onChange={e=>setCap(e.target.value)} placeholder="Caption…" style={IS({flex:1})}/><button onClick={()=>fRef.current?.click()} style={BS("#1e3a8a","#93c5fd",{whiteSpace:"nowrap"})}>📁 Upload</button><input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={doPhoto}/></div>}
          {(td.photos||[]).length===0?<div style={{textAlign:"center",padding:"14px 0",color:T.dim,fontSize:12}}>No photos yet.</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>{(td.photos||[]).map(p=>(<div key={p.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid "+T.border,cursor:"pointer"}} onClick={()=>setLb(p)}><img src={p.data} alt={p.caption} style={{width:"100%",height:90,objectFit:"cover",display:"block"}}/><div style={{padding:"5px 7px",background:T.panel}}><div style={{fontSize:9,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.caption}</div><div style={{fontSize:8,color:T.dim}}>{p.by} · {p.size}</div></div>{canEdit&&<button onClick={e=>{e.stopPropagation();onDelPhoto(p.id);}} style={{position:"absolute",top:4,right:4,background:"#000b",border:"none",borderRadius:99,width:20,height:20,color:"#fff",fontSize:10,cursor:"pointer"}}>✕</button>}</div>))}</div>}
        </div>
        {/* actions */}
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {canEdit?<button onClick={doSave} style={BS("#1d4ed8")}>💾 Save Changes</button>:<div style={{fontSize:12,color:T.dim,padding:"8px 12px",background:T.bg,borderRadius:8,border:"1px solid "+T.border}}>🔒 View only — Omer can edit</div>}
          <button onClick={doAI} disabled={aiLd} style={BS("#7c1d1d","#fca5a5",{opacity:aiLd?.7:1})}>{aiLd?"Analyzing…":"🤖 AI Advisor"}</button>
          <button onClick={onBack} style={BS(T.border,T.mid)}>← Back</button>
        </div>
        {(aiLd||ai)&&<div style={{background:"#0a0d14",border:"1px solid #7c1d1d44",borderRadius:10,padding:14,marginBottom:14}}>{LB("🤖 AI Advisor")}{aiLd?<div style={{color:T.dim,fontSize:12}}>Analyzing…</div>:<div style={{fontSize:13,color:T.text,lineHeight:1.85,whiteSpace:"pre-wrap"}}>{ai}</div>}</div>}
        {(td.history||[]).length>0&&<div>{LB("Update History")}<div style={{maxHeight:160,overflowY:"auto"}}>{(td.history||[]).map((h,i)=>(<div key={i} style={{borderLeft:"2px solid "+T.border,paddingLeft:10,marginBottom:7}}><div style={{fontSize:10,color:T.dim}}>{h.time} · <span style={{color:USERS.find(u=>u.name===h.who)?.color||T.mid}}>{h.who}</span> · <span style={{color:STATUS[h.status]?.color}}>{STATUS[h.status]?.label}</span> · {h.prog}%</div>{h.note&&<div style={{fontSize:11,color:"#1e3a5f",marginTop:1}}>{h.note}</div>}</div>))}</div></div>}
      </div>
    </div>
  );
}

/* ════════════════ MAIN APP ════════════════ */
function App(){
  /* ── state ── */
  const [loading, setLoading] = useState(true);
  const [user,    setUser]    = useState(null);   // null = show login
  const [data,    setData]    = useState(mkData);
  const [saveMsg, setSaveMsg] = useState("");
  const [saving,  setSaving]  = useState(false);
  const [page,    setPage]    = useState("dashboard");
  const [tid,     setTid]     = useState(null);
  const [payTab,  setPayTab]  = useState("task");
  const [payFilt, setPayFilt] = useState("All");
  const [matFilt, setMatFilt] = useState("All");
  const [fl,      setFl]      = useState("All");
  const [cat,     setCat]     = useState("All");
  const [stF,     setStF]     = useState("All");
  const [srch,    setSrch]    = useState("");
  const [brief,   setBrief]   = useState("");
  const [briefLd, setBriefLd] = useState(false);

  /* ── load on mount ── */
  useEffect(()=>{
    dbLoad().then(saved=>{
      setData(mergeData(saved));
      setLoading(false);
    });
  },[]);

  /* ── save helper ── */
  const save = useCallback(async(d)=>{
    setSaving(true);
    const ok=await dbSave(d);
    setSaveMsg(ok?"✓ Saved":"⚠ Save failed");
    setTimeout(()=>setSaveMsg(""),3000);
    setSaving(false);
  },[]);

  /* ── mutate ── */
  const mut = useCallback(fn=>{
    setData(prev=>{ const next=fn(prev); save(next); return next; });
  },[save]);

  /* ── addLog (safe — takes user object directly) ── */
  function addLog(u,action,detail){
    if(!u) return;
    const entry={id:Date.now(),time:now(),who:u.name,wid:u.id,action,detail:detail||""};
    setData(prev=>{ const next={...prev,log:[entry,...(prev.log||[]).slice(0,199)]}; save(next); return next; });
  }

  /* ── refresh ── */
  async function refresh(){
    setSaveMsg("🔄 Refreshing…");
    const saved=await dbLoad();
    setData(mergeData(saved));
    setSaveMsg("✓ Refreshed");
    setTimeout(()=>setSaveMsg(""),2000);
  }

  /* ── LOGIN HANDLER — no state dependency, completely safe ── */
  function handleLogin(u){
    // 1. set user state
    setUser(u);
    // 2. set page
    setPage(u.perm==="payments_only"?"payments":"dashboard");
    // 3. log directly into data without going through mut/addLog
    const entry={id:Date.now(),time:now(),who:u.name,wid:u.id,action:"Login",detail:u.name+" logged in"};
    setData(prev=>{ const next={...prev,log:[entry,...(prev.log||[]).slice(0,199)]}; save(next); return next; });
  }

  function handleLogout(){ setUser(null); setPage("dashboard"); }

  /* ── LOADING SCREEN ── */
  if(loading) return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:48}}>🏡</div>
      <div style={{fontSize:18,color:T.hi,fontWeight:700}}>Valencia 116-D</div>
      <div style={{fontSize:13,color:T.mid}}>Loading project data…</div>
      <div style={{width:48,height:48,border:"4px solid "+T.border,borderTopColor:"#a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  /* ── LOGIN SCREEN ── */
  if(!user) return <LoginScreen onLogin={handleLogin}/>;

  /* ── DERIVED ── */
  const canEdit  = user.perm==="all";
  const isOffice = user.perm==="payments_only";
  const totBudget= Object.values(data.tasks).reduce((s,t)=>s+(t.budget.total||0),0);
  const totPaid  = Object.values(data.tasks).reduce((s,t)=>s+(t.budget.paid||0),0);
  const totLabour= (data.labour||[]).reduce((s,l)=>s+l.amount,0);
  const totProg  = Math.round(Object.values(data.tasks).reduce((s,t)=>s+t.progress,0)/TASKS.length);
  const cnts={done:0,active:0,blocked:0};
  Object.values(data.tasks).forEach(t=>{ if(t.status==="completed")cnts.done++; else if(t.status==="in-progress")cnts.active++; else if(t.status==="blocked")cnts.blocked++; });
  const allPays=TASKS.flatMap(t=>(data.tasks[t.id].budget.payments||[]).map(p=>({...p,tid:t.id,tname:data.names[t.id],ticon:t.icon}))).sort((a,b)=>b.id-a.id);
  const matStock=useMemo(()=>{ const m={}; (data.mats||[]).forEach(x=>{ if(!m[x.name]) m[x.name]={name:x.name,unit:x.unit,i:0,o:0,v:0}; if(x.type==="received"){m[x.name].i+=x.qty;m[x.name].v+=x.qty*(x.rate||0);}else m[x.name].o+=x.qty; }); return Object.values(m).map(x=>({...x,bal:x.i-x.o})); },[data.mats]);
  const visTasks=TASKS.filter(t=>{ if(fl!=="All"&&!t.floors.includes(fl))return false; if(cat!=="All"&&t.cat!==cat)return false; if(stF!=="All"&&data.tasks[t.id].status!==stF)return false; if(srch&&!(data.names[t.id]||"").toLowerCase().includes(srch.toLowerCase()))return false; return true; });
  const activeTask=tid?TASKS.find(t=>t.id===tid):null;

  /* ── MUTATIONS ── */
  function saveTask(id,d){
    const n=now();
    mut(prev=>({...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],status:d.status,progress:d.prog,notes:d.notes,updatedBy:user.name,updatedAt:n,budget:{...prev.tasks[id].budget,total:d.budget},contractor:d.contractor,history:[{time:n,who:user.name,status:d.status,prog:d.prog,note:d.notes},...(prev.tasks[id].history||[]).slice(0,19)]}}}));
    addLog(user,"Task Updated",data.names[id]+" → "+d.status+" "+d.prog+"%");
    setPage("dashboard");
  }
  function addPay(id,p){ mut(prev=>{ const b=prev.tasks[id].budget; const pays=[{id:Date.now(),...p,by:user.name,at:now()},...(b.payments||[])]; return{...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],budget:{...b,paid:pays.reduce((s,x)=>s+x.amount,0),payments:pays}}}}; }); addLog(user,"Payment","PKR"+fmtM(p.amount)+" "+data.names[id]); }
  function delPay(tid,pid){ if(!canEdit)return; mut(prev=>{ const b=prev.tasks[tid].budget; const pays=(b.payments||[]).filter(p=>p.id!==pid); return{...prev,tasks:{...prev.tasks,[tid]:{...prev.tasks[tid],budget:{...b,paid:pays.reduce((s,p)=>s+p.amount,0),payments:pays}}}}; }); }
  function addPhoto(id,p){ mut(prev=>({...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],photos:[{id:Date.now(),...p,by:user.name,at:now()},...(prev.tasks[id].photos||[])]}}})); addLog(user,"Photo Added",data.names[id]); }
  function delPhoto(id,pid){ if(!canEdit)return; mut(prev=>({...prev,tasks:{...prev.tasks,[id]:{...prev.tasks[id],photos:(prev.tasks[id].photos||[]).filter(p=>p.id!==pid)}}})); }
  function saveName(id,name){ if(!canEdit)return; mut(prev=>({...prev,names:{...prev.names,[id]:name}})); addLog(user,"Renamed","→ "+name); }
  function addLabour(l){ mut(prev=>({...prev,labour:[{id:Date.now(),...l,by:user.name,at:now()},...(prev.labour||[])]})); addLog(user,"Labour","PKR"+fmtM(l.amount)+" "+l.work); }
  function delLabour(id){ if(!canEdit)return; mut(prev=>({...prev,labour:(prev.labour||[]).filter(l=>l.id!==id)})); }
  function addMat(m){ mut(prev=>({...prev,mats:[{id:Date.now(),...m,by:user.name,at:now()},...(prev.mats||[])]})); addLog(user,"Material "+m.type,m.qty+" "+m.unit+" "+m.name); }
  function delMat(id){ if(!canEdit)return; mut(prev=>({...prev,mats:(prev.mats||[]).filter(m=>m.id!==id)})); }

  async function getBrief(){
    setBrief(""); setBriefLd(true); setPage("briefing");
    const sum=TASKS.map(t=>{ const s=data.tasks[t.id],b=s.budget; return data.names[t.id]+"["+t.priority+"]:"+s.status+"("+s.progress+"%)B:"+fmtM(b.total)+"P:"+fmtM(b.paid); }).join("\n");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,system:"Senior construction PM briefing luxury home Lahore. Structured emoji-rich actionable.",messages:[{role:"user",content:"Project:"+PROJECT.name+"\nBudget:PKR"+fmtM(totBudget)+" Paid:PKR"+fmtM(totPaid)+" Labour:PKR"+fmtM(totLabour)+"\n\n"+sum+"\n\n1.📊 Health 2.🔴 Urgent 3.✅ Top 3 TODAY 4.💰 Finance 5.📅 Timeline"}]})});
      const d=await r.json(); setBrief(d.error?"⚠️ "+d.error.message:d.content?.map(c=>c.text||"").join("")||"No response.");
    }catch(e){ setBrief("⚠️ "+e.message); }
    setBriefLd(false);
  }

  const navPages=[["dashboard","📋 Tasks"],["payments","💳 Payments"],["analytics","📈 Analytics"],["log","📜 Activity"],["briefing","🤖 AI"]].filter(([p])=>isOffice?p==="payments":true);

  /* ── NAV ── */
  function Nav(){
    return(
      <div style={{background:T.panel,borderBottom:"1px solid "+T.border,padding:"12px 20px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1060,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:9,letterSpacing:3,color:T.dim,textTransform:"uppercase"}}>{PROJECT.firm} · {PROJECT.architect}</div>
              <div style={{fontSize:16,color:T.hi,fontWeight:700,margin:"3px 0 1px"}}>🏡 {PROJECT.name}</div>
              <div style={{fontSize:11,color:T.dim}}>{PROJECT.client} · {PROJECT.plotSize} · {PROJECT.totalArea}</div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {navPages.map(([p,l])=><button key={p} onClick={p==="briefing"?getBrief:()=>setPage(p)} style={BS(page===p?"#1d4ed8":T.border,page===p?"#fff":T.mid,{fontSize:11})}>{l}</button>)}
              <button onClick={refresh} title="Refresh data" style={BS(T.border,T.mid,{fontSize:11,padding:"8px 10px"})}>🔄</button>
              <div style={{display:"flex",alignItems:"center",gap:6,background:T.bg,border:"1px solid "+user.color+"44",borderRadius:8,padding:"5px 10px"}}>
                <span style={{fontSize:14}}>{user.icon}</span>
                <div><div style={{fontSize:12,color:user.color,fontWeight:600}}>{user.name}</div><div style={{fontSize:10,color:T.dim}}>{user.role}</div></div>
                <button onClick={handleLogout} style={BS("transparent",T.dim,{fontSize:10,padding:"2px 6px"})}>⏏</button>
              </div>
              {(saveMsg||saving)&&<span style={{fontSize:10,color:saving?T.amber:saveMsg.startsWith("✓")?T.green:T.red,fontWeight:600}}>{saving?"Saving…":saveMsg}</span>}
            </div>
          </div>
          <div style={{marginTop:10,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>

  /* ── DASHBOARD ── */

                onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>

                <div style={{paddingLeft:6}}>

            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 100px 50px",padding:"6px 16px",borderBottom:"1px solid "+T.border,background:T.bg}}>{["Task","Budget","Paid","Remaining","Pay%","Txns"].map(h=><div key={h} style={{fontSize:9,color:T.dim,letterSpacing:1,textTransform:"uppercase"}}>{h}</div>)}</div>

              <div key={task.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 100px 50px",padding:"9px 16px",borderBottom:i<TASKS.length-1?"1px solid "+T.bg:"none",background:i%2===0?T.bg:T.panel,alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:14}}>{task.icon}</span><div><div style={{fontSize:12,color:T.text}}>{data.names[task.id]}</div><span style={CH(STATUS[s.status].color)}>{STATUS[s.status].label}</span></div></div>
                <div style={{fontSize:12,color:b.total>0?"#38bdf8":T.dim}}>{b.total>0?"PKR "+fmtM(b.total):"—"}</div>
                <div style={{fontSize:12,color:T.green,fontWeight:600}}>PKR {fmtM(b.paid)}</div>
                <div style={{fontSize:12,color:b.total>0?T.amber:T.dim}}>{b.total>0?"PKR "+fmtM(b.total-b.paid):"—"}</div>
                <div style={{display:"flex",gap:5,alignItems:"center"}}><div style={{flex:1,height:4,background:T.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:pp+"%",background:pp>=100?T.red:T.green,borderRadius:99}}/></div><span style={{fontSize:10,color:T.dim}}>{b.total>0?pp+"%":"—"}</span></div>
                <div style={{fontSize:12,color:T.dim,textAlign:"center"}}>{(b.payments||[]).length}</div>

              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{["All","Payment","Advance","Retention","Labour","Material"].map(f=><button key={f} onClick={()=>setPayFilt(f)} style={BS(payFilt===f?"#1d4ed8":T.border,payFilt===f?"#fff":T.mid,{fontSize:9,padding:"3px 7px"})}>{f}</button>)}</div>

            {fp.length===0&&<div style={{padding:"28px",textAlign:"center",color:T.dim,fontSize:12}}>No transactions yet.</div>}
            {fp.map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 16px",borderBottom:"1px solid "+T.bg,flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:15}}>{p.ticon}</span><div><div style={{fontSize:12,color:T.text,fontWeight:500}}>{p.tname}</div><div style={{display:"flex",gap:5,marginTop:2}}><span style={CH("#a78bfa")}>{p.type}</span><span style={CH("#64748b")}>{p.method}</span>{p.note&&<span style={{fontSize:10,color:T.dim}}>· {p.note}</span>}</div><div style={{fontSize:10,color:T.dim,marginTop:1}}>{p.date} · {p.by}</div></div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,color:T.green,fontWeight:700}}>{fmt(p.amount)}</span>{canEdit&&<button onClick={()=>delPay(p.tid,p.id)} style={BS("transparent",T.red,{padding:"2px 6px",fontSize:10,border:"1px solid "+T.red+"33"})}>✕</button>}</div>
            </div>))}
            {fp.length>0&&<div style={{padding:"9px 16px",background:T.bg,display:"flex",justifyContent:"flex-end"}}><span style={{fontSize:12,color:T.green,fontWeight:700}}>Total: {fmt(fpT)}</span></div>}
          </div>
        </>}

        {payTab==="labour"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>{[{l:"Total Labour",v:fmt(totLabour),c:"#fb923c"},{l:"Entries",v:(data.labour||[]).length,c:T.text},{l:"Avg/Entry",v:(data.labour||[]).length>0?fmt(Math.round(totLabour/(data.labour||[]).length)):"—",c:T.amber}].map(x=>(<div key={x.l} style={{background:T.panel,border:"1px solid #fb923c22",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:9,color:T.dim,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>{x.l}</div><div style={{fontSize:20,fontWeight:700,color:x.c}}>{x.v}</div></div>))}</div>
          {!isOffice&&<LabourForm onAdd={addLabour}/>}
          <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid "+T.border,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:T.text,fontWeight:600}}>Labour History ({(data.labour||[]).length})</span><span style={{fontSize:12,color:"#fb923c",fontWeight:600}}>Total: {fmt(totLabour)}</span></div>
            {(data.labour||[]).length===0&&<div style={{padding:"28px",textAlign:"center",color:T.dim,fontSize:12}}>No entries yet.</div>}
            {(data.labour||[]).map((l,i)=>(<div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:i<(data.labour||[]).length-1?"1px solid "+T.bg:"none",background:i%2===0?T.bg:T.panel,flexWrap:"wrap",gap:6}}>
              <div><div style={{fontSize:12,color:T.text,fontWeight:500}}>{l.work||"Labour"}</div><div style={{display:"flex",gap:5,marginTop:2,flexWrap:"wrap"}}>{l.worker&&<span style={CH("#fb923c")}>👷 {l.worker}</span>}<span style={CH("#64748b")}>{l.method}</span><span style={{fontSize:10,color:T.dim}}>· {l.by}</span></div><div style={{fontSize:10,color:T.dim,marginTop:1}}>{l.date}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,color:"#fb923c",fontWeight:700}}>{fmt(l.amount)}</span>{canEdit&&<button onClick={()=>delLabour(l.id)} style={BS("transparent",T.red,{padding:"2px 6px",fontSize:10,border:"1px solid "+T.red+"33"})}>✕</button>}</div>

          </div>
          {!isOffice&&<MatForm onAdd={addMat}/>}
          <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid "+T.border,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:12,color:T.text,fontWeight:600}}>Material Ledger ({(data.mats||[]).length})</span>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{["All","received","issued",...[...new Set((data.mats||[]).map(m=>m.name))]].filter((v,i,a)=>a.indexOf(v)===i).map(f=><button key={f} onClick={()=>setMatFilt(f)} style={BS(matFilt===f?"#1d4ed8":T.border,matFilt===f?"#fff":T.mid,{fontSize:9,padding:"3px 7px",textTransform:"capitalize"})}>{f}</button>)}</div>

              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:15,fontWeight:700,color:m.type==="received"?T.green:T.red}}>{m.type==="received"?"+":"-"}{m.qty} {m.unit}</span>{m.type==="received"&&m.rate>0&&<span style={{fontSize:10,color:"#38bdf8"}}>PKR {fmtM(m.qty*m.rate)}</span>}{canEdit&&<button onClick={()=>delMat(m.id)} style={BS("transparent",T.red,{padding:"2px 6px",fontSize:10,border:"1px solid "+T.red+"33"})}>✕</button>}</div>
            </div>))}
          </div>
        </>}
      </div>
    );
  }

  /* ── ANALYTICS ── */
  function Analytics(){
    const byS=Object.entries(STATUS).map(([k,v])=>({label:v.label,count:TASKS.filter(t=>data.tasks[t.id].status===k).length,color:v.color}));
    const cols=["#38bdf8","#a78bfa","#22c55e","#f59e0b","#f43f5e"];
    const byC=[...new Set(TASKS.map(t=>t.cat))].map((c,i)=>({cat:c,tasks:TASKS.filter(t=>t.cat===c),budget:TASKS.filter(t=>t.cat===c).reduce((s,t)=>s+data.tasks[t.id].budget.total,0),paid:TASKS.filter(t=>t.cat===c).reduce((s,t)=>s+data.tasks[t.id].budget.paid,0),prog:Math.round(TASKS.filter(t=>t.cat===c).reduce((s,t)=>s+data.tasks[t.id].progress,0)/TASKS.filter(t=>t.cat===c).length),color:cols[i%cols.length]}));
    return(
      <div style={{maxWidth:1060,margin:"0 auto",padding:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,padding:16}}><div style={{fontSize:13,color:T.text,fontWeight:600,marginBottom:12}}>Tasks by Status</div>{byS.map(s=>(<div key={s.label} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:s.color}}>{s.label}</span><span style={{color:T.mid}}>{s.count}</span></div><div style={{height:7,background:T.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:(s.count/TASKS.length*100)+"%",background:s.color,borderRadius:99}}/></div></div>))}</div>
          <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,padding:16}}><div style={{fontSize:13,color:T.text,fontWeight:600,marginBottom:12}}>Budget by Category</div>{byC.map(c=>{ const pct=c.budget>0?Math.round(c.paid/c.budget*100):0; return(<div key={c.cat} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:c.color}}>{c.cat} ({c.tasks.length})</span><span style={{color:T.mid}}>PKR {fmtM(c.budget)} · {pct}%</span></div><div style={{height:6,background:c.color+"33",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:c.color,borderRadius:99}}/></div></div>); })}</div>
        </div>
      </div>

  /* ── LOG ── */
  function Log(){
    return(
      <div style={{maxWidth:720,margin:"0 auto",padding:16}}>
        <div style={{background:T.panel,border:"1px solid "+T.border,borderRadius:12,overflow:"hidden"}}>

  /* ── BRIEFING ── */

          <div style={{fontSize:18,color:T.hi,fontWeight:700,marginBottom:3}}>Construction Report</div>
          <div style={{fontSize:11,color:T.dim,marginBottom:16}}>{PROJECT.name}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>{[{l:"Budget",v:fmt(totBudget),c:"#38bdf8"},{l:"Paid",v:fmt(totPaid),c:T.green},{l:"Labour",v:fmt(totLabour),c:"#fb923c"},{l:"Progress",v:totProg+"%",c:T.purple}].map(x=>(<div key={x.l} style={{background:T.bg,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10,color:T.dim,marginBottom:2,textTransform:"uppercase"}}>{x.l}</div><div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div></div>))}</div>
          {briefLd?<div style={{textAlign:"center",padding:"24px 0",color:T.dim}}><div style={{fontSize:32,marginBottom:8}}>🏗️</div><div>Analyzing…</div></div>:<div style={{fontSize:13,color:T.text,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{brief||"Click 'AI' in nav to generate report."}</div>}
        </div>
      </div>
    );
  }

  /* ── RENDER ── */
  return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'Segoe UI',Arial,sans-serif"}}>
      <Nav/>
      {page==="dashboard"&&<Dashboard/>}
      {page==="task"&&activeTask&&<TaskPage key={tid} task={activeTask} name={data.names[tid]} td={data.tasks[tid]} perm={user.perm} canEdit={canEdit} onSave={d=>saveTask(tid,d)} onBack={()=>setPage("dashboard")} onAddPay={p=>addPay(tid,p)} onDelPay={pid=>delPay(tid,pid)} onAddPhoto={p=>addPhoto(tid,p)} onDelPhoto={pid=>delPhoto(tid,pid)}/>}
      {page==="payments"&&<Payments/>}
      {page==="analytics"&&<Analytics/>}
      {page==="log"&&<Log/>}
      {page==="briefing"&&<Briefing/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
