// ─── DB ───────────────────────────────────────────────────────────────────────
async function dbLoad(){
  try{
    if(!BIN_ID){
      const r=await fetch(JURL,{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":JKEY,"X-Bin-Name":"valencia116d"},body:JSON.stringify({_init:true})});
      const d=await r.json();
      BIN_ID=d.metadata?.id||null;
      if(BIN_ID) localStorage.setItem("vlc_bin_id",BIN_ID);
      return null;
    }
    const r=await fetch(JURL+"/"+BIN_ID+"/latest",{headers:{"X-Master-Key":JKEY}});
    const d=await r.json();
    if(d.record?._init) return null;
    return d.record||null;
  }catch(e){console.error("Load:",e);return null;}
}
async function dbSave(data){
  try{
    if(!BIN_ID) return false;
    const r=await fetch(JURL+"/"+BIN_ID,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JKEY},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){console.error("Save:",e);return false;}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt=n=>"PKR "+Number(n||0).toLocaleString("en-PK");
const fmtM=n=>n>=1e6?(n/1e6).toFixed(2)+"M":n>=1000?Math.round(n/1000)+"K":String(n||0);
const nowStr=()=>new Date().toLocaleString("en-PK",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const todayStr=()=>new Date().toISOString().slice(0,10);
const el=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") e.className=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{ if(c==null) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
};
const div=(s,ch)=>el("div",{style:s},ch);
const span=(s,t)=>el("span",{style:s},[t]);

};
const inp=(placeholder,type="text",val="")=>{

const chip=(text,color)=>{

function mkData(){
  return{
    names:TASKS.reduce((a,t)=>({...a,[t.id]:t.name}),{}),
    tasks:TASKS.reduce((a,t)=>({...a,[t.id]:{status:"not-started",progress:0,notes:"",updatedBy:null,history:[],budget:{total:0,paid:0,payments:[]},contractor:{name:"",phone:"",co:""},photos:[]}}),{}),
    labour:[],mats:[],log:[],
  };
}
function mergeData(saved){
  const base=mkData();
  if(!saved) return base;
  const m={...base,...saved};
  TASKS.forEach(t=>{ if(!m.tasks[t.id]) m.tasks[t.id]=base.tasks[t.id]; if(!m.names[t.id]) m.names[t.id]=t.name; });
  return m;
}
let saveTimer=null;
function saveData(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const ok=await dbSave(DATA);
    const msg=document.getElementById("save-msg");
    if(msg){ msg.textContent=ok?"✓ Saved":"⚠ Save failed"; msg.style.color=ok?"#22c55e":"#f43f5e"; setTimeout(()=>{if(msg)msg.textContent="";},3000); }
  },600);
}
function addLog(action,detail=""){
  if(!USER) return;
  DATA.log=[{id:Date.now(),time:nowStr(),who:USER.name,wid:USER.id,action,detail},...(DATA.log||[]).slice(0,199)];
  saveData();
}

  else if(PAGE==="log") body.appendChild(renderLog());
  else if(PAGE==="briefing") body.appendChild(renderBriefing());
  wrap.appendChild(body);
  app.appendChild(wrap);
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function renderLogin(){
  let pinSel=null;
  const root=div({minHeight:"100vh",background:"#07090f",display:"flex",alignItems:"center",justifyContent:"center"});
  const box=div({background:"#0d1117",border:"1px solid #1a2030",borderRadius:"18px",padding:"40px",width:"340px",textAlign:"center",boxShadow:"0 24px 64px #00000088"});

  function showPick(){
    box.innerHTML="";
    box.appendChild(div({fontSize:"48px",marginBottom:"10px"},["🏡"]));
    box.appendChild(el("div",{style:{fontSize:"20px",color:"#f1f5f9",fontWeight:"700",marginBottom:"4px"}},["Valencia 116-D"]));
    box.appendChild(el("div",{style:{fontSize:"12px",color:"#475569",marginBottom:"4px"}},[PROJECT.name]));
    box.appendChild(el("div",{style:{fontSize:"11px",color:"#334155",marginBottom:"28px"}},[PROJECT.plotSize+" · "+PROJECT.totalArea]));
    box.appendChild(el("div",{style:{fontSize:"11px",color:"#475569",marginBottom:"14px",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:"600"}},["Select Profile"]));
    USERS.forEach(u=>{
      const b=el("button",{style:{width:"100%",marginBottom:"10px",padding:"14px 16px",textAlign:"left",display:"flex",alignItems:"center",gap:"14px",border:"1px solid #1a2030",borderRadius:"12px",background:"#1a2030",cursor:"pointer",fontFamily:"inherit"}});
      b.innerHTML=`<span style="font-size:26px">${u.icon}</span><div style="flex:1;text-align:left"><div style="font-size:14px;color:#f1f5f9;font-weight:600">${u.name}</div><div style="font-size:11px;color:${u.color};margin-top:2px">${u.role}</div></div><span style="font-size:12px;color:#334155">${u.pin?"🔒":"→"}</span>`;
      b.onmouseenter=()=>{ b.style.borderColor=u.color; b.style.background=u.color+"22"; };
      b.onmouseleave=()=>{ b.style.borderColor="#1a2030"; b.style.background="#1a2030"; };
      b.onclick=()=>{ if(!u.pin){ doLogin(u); }else{ pinSel=u; showPin(); } };
      box.appendChild(b);
    });
  }

  function showPin(){
    box.innerHTML="";
    box.appendChild(div({fontSize:"28px",marginBottom:"6px"},[pinSel.icon]));
    box.appendChild(el("div",{style:{fontSize:"15px",color:"#f1f5f9",fontWeight:"600",marginBottom:"2px"}},[pinSel.name]));
    box.appendChild(el("div",{style:{fontSize:"11px",color:pinSel.color,marginBottom:"20px"}},[pinSel.role]));
    box.appendChild(el("div",{style:{fontSize:"10px",color:"#475569",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"8px",fontWeight:"600"}},["Enter PIN"]));
    const pinInp=el("input",{type:"password",maxlength:"6",placeholder:"••••",style:{textAlign:"center",fontSize:"24px",letterSpacing:"10px",marginBottom:"8px",padding:"12px",background:"#07090f",border:"1px solid #1a2030",borderRadius:"8px",color:"#cbd5e1",width:"100%",boxSizing:"border-box"}});
    const errMsg=el("div",{style:{fontSize:"11px",color:"#f43f5e",marginBottom:"8px",minHeight:"16px"}});
    const attempt=()=>{ if(pinInp.value===pinSel.pin){ doLogin(pinSel); }else{ errMsg.textContent="Incorrect PIN"; pinInp.value=""; } };
    pinInp.onkeydown=e=>{ if(e.key==="Enter") attempt(); };
    box.appendChild(pinInp);
    box.appendChild(errMsg);
    const row=div({display:"flex",gap:"8px",marginTop:"8px"});
    row.appendChild(btn("← Back","#1a2030","#475569",()=>{ pinSel=null; showPick(); },{flex:"1"}));
    row.appendChild(btn("Login",pinSel.color,"#000",attempt,{flex:"1",fontWeight:"700"}));
    box.appendChild(row);
    setTimeout(()=>pinInp.focus(),50);
  }

  function doLogin(u){
    USER=u;
    PAGE=u.perm==="payments_only"?"payments":"dashboard";
    // log the login
    DATA.log=[{id:Date.now(),time:nowStr(),who:u.name,wid:u.id,action:"Login",detail:u.name+" logged in"},...(DATA.log||[]).slice(0,199)];
    saveData();
    render();
  }

  showPick();
  root.appendChild(box);
  return root;
}

  const stRow=div({display:"flex",gap:"4px",flexWrap:"wrap"});
  [["All","All","#1a2030","#475569"],["not-started","Not Started","#64748b33","#64748b"],["in-progress","In Progress","#f59e0b33","#f59e0b"],["completed","Completed","#22c55e33","#22c55e"],["blocked","Blocked","#f43f5e33","#f43f5e"]].forEach(([v,l,bg,fg])=>{

  function refreshCards(){
    grid.innerHTML="";
    const vis=TASKS.filter(t=>{
      if(FILTER.fl!=="All"&&!t.floors.includes(FILTER.fl)) return false;
      if(FILTER.cat!=="All"&&t.cat!==FILTER.cat) return false;

    vis.forEach(task=>{

      // name
      const nameRow=div({fontWeight:"700",fontSize:"13px",color:"#f1f5f9",marginBottom:"2px",display:"flex",alignItems:"center",gap:"5px"});
      nameRow.appendChild(span({},DATA.names[task.id]));
      if(canEdit){
        const editIcon=span({fontSize:"9px",color:"#334155",cursor:"pointer",opacity:".5"},"✏️");

      // progress bar

      pWrap.appendChild(pLbl);
      const pBg=div({height:"3px",background:"#1a2030",borderRadius:"99px",overflow:"hidden"});
      const barC=s.status==="completed"?"#22c55e":s.status==="in-progress"?"#f59e0b":s.status==="blocked"?"#f43f5e":"#334155";
      const pFill=div({height:"100%",width:s.progress+"%",background:barC,borderRadius:"99px"});

      // payment mini

      const plbl=div({display:"flex",justifyContent:"space-between",fontSize:"10px",color:"#475569",marginBottom:"2px"});
      plbl.appendChild(span({},"💰 Payment")); plbl.appendChild(span({color:b.total===0?"#334155":pp>=100?"#f43f5e":"#22c55e"},b.total===0?"—":pp+"%"));
      pmini.appendChild(plbl);
      const pbg=div({height:"3px",background:"#1a2030",borderRadius:"99px",overflow:"hidden",marginBottom:"3px"});
      const pf=div({height:"100%",width:pp+"%",background:pp>=100?"#f43f5e":"#22c55e",borderRadius:"99px"});
      pbg.appendChild(pf); pmini.appendChild(pbg);
      const pamt=div({display:"flex",justifyContent:"space-between",fontSize:"10px"});
      pamt.appendChild(span({color:"#22c55e"},"Paid: PKR "+fmtM(b.paid)));
      pamt.appendChild(span({color:"#334155"},b.total>0?"/"+fmtM(b.total):"No budget set"));
      pmini.appendChild(pamt);
      inner.appendChild(pmini);
      const foot=div({display:"flex",justifyContent:"space-between",marginTop:"5px"});
      foot.appendChild(s.updatedBy?span({fontSize:"10px",color:"#334155"},"✏️ "+s.updatedBy):span({},""));
      if((s.photos||[]).length>0) foot.appendChild(span({fontSize:"10px",color:"#38bdf8"},"📷 "+(s.photos||[]).length));
      inner.appendChild(foot);
      card.appendChild(inner);
      grid.appendChild(card);
    });
  }
  refreshCards();
  return root;
}

// ─── ANALYTICS ────────────────────────────────────────────────────────────────
function renderAnalytics(){
  const root=div({});
  const grid=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"});
  // status
  const sb=div({background:"#0d1117",border:"1px solid #1a2030",borderRadius:"12px",padding:"16px"});
  sb.appendChild(el("div",{style:{fontSize:"13px",color:"#cbd5e1",fontWeight:"600",marginBottom:"12px"}},["Tasks by Status"]));
  Object.entries(STATUS).forEach(([k,v])=>{
    const count=TASKS.filter(t=>DATA.tasks[t.id].status===k).length;
    const row=div({marginBottom:"10px"});
    row.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:${v.color}">${v.label}</span><span style="color:#475569">${count}</span></div><div style="height:7px;background:#1a2030;border-radius:99px;overflow:hidden"><div style="height:100%;width:${count/TASKS.length*100}%;background:${v.color};border-radius:99px"></div></div>`;
    sb.appendChild(row);
  });
  grid.appendChild(sb);
  // budget
  const bb=div({background:"#0d1117",border:"1px solid #1a2030",borderRadius:"12px",padding:"16px"});
  bb.appendChild(el("div",{style:{fontSize:"13px",color:"#cbd5e1",fontWeight:"600",marginBottom:"12px"}},["Budget by Category"]));
  const cols=["#38bdf8","#a78bfa","#22c55e","#f59e0b","#f43f5e"];
  [...new Set(TASKS.map(t=>t.cat))].forEach((cat,i)=>{
    const tasks=TASKS.filter(t=>t.cat===cat);
    const budget=tasks.reduce((s,t)=>s+DATA.tasks[t.id].budget.total,0);
    const paid=tasks.reduce((s,t)=>s+DATA.tasks[t.id].budget.paid,0);
    const pct=budget>0?Math.round(paid/budget*100):0;
    const color=cols[i%cols.length];
    const row=div({marginBottom:"10px"});
    row.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:${color}">${cat} (${tasks.length})</span><span style="color:#475569">PKR ${fmtM(budget)} · ${pct}%</span></div><div style="height:6px;background:${color}33;border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${color};border-radius:99px"></div></div>`;
    bb.appendChild(row);
  });
  grid.appendChild(bb);
  root.appendChild(grid);
  return root;
}

function renderLog(){
  const root=div({background:"#0d1117",border:"1px solid #1a2030",borderRadius:"12px",overflow:"hidden",maxWidth:"720px",margin:"0 auto"});
  const hdr=div({padding:"12px 18px",borderBottom:"1px solid #1a2030",display:"flex",justifyContent:"space-between"});

  root.appendChild(hdr);
  if((DATA.log||[]).length===0){ root.appendChild(el("div",{style:{padding:"36px",textAlign:"center",color:"#334155",fontSize:"13px"}},["No activity yet."])); return root; }
  (DATA.log||[]).forEach((e,i)=>{
    const u=USERS.find(u=>u.id===e.wid)||{color:"#475569",icon:"👤"};
    const row=div({display:"flex",gap:"10px",padding:"10px 18px",borderBottom:i<(DATA.log||[]).length-1?"1px solid #07090f":"none",background:i%2===0?"#07090f":"#0d1117"});
    row.appendChild(span({fontSize:"14px",marginTop:"2px"},u.icon));
    const d=div({flex:"1"}); d.innerHTML=`<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px"><span style="font-size:12px;color:${u.color};font-weight:600">${e.who}</span><span style="font-size:10px;color:#334155">${e.time}</span></div><div style="font-size:12px;color:#cbd5e1;margin-top:1px"><span style="color:#f59e0b">${e.action}</span>${e.detail?" — "+e.detail:""}</div>`;
    row.appendChild(d); root.appendChild(row);
  });
  return root;
}

// ─── BRIEFING ────────────────────────────────────────────────────────────────
function renderBriefing(){
  const totB=Object.values(DATA.tasks).reduce((s,t)=>s+(t.budget.total||0),0);
  const totP=Object.values(DATA.tasks).reduce((s,t)=>s+(t.budget.paid||0),0);
  const totL=(DATA.labour||[]).reduce((s,l)=>s+l.amount,0);
  const totPr=Math.round(Object.values(DATA.tasks).reduce((s,t)=>s+t.progress,0)/TASKS.length);
  const root=div({maxWidth:"680px",margin:"0 auto"});
  const box=div({background:"#0d1117",border:"1px solid #7c1d1d33",borderRadius:"14px",padding:"24px"});
  box.innerHTML=`<div style="font-size:10px;color:#fb923c;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-weight:600">🤖 AI Daily Briefing</div><div style="font-size:18px;color:#f1f5f9;font-weight:700;margin-bottom:3px">Construction Report</div><div style="font-size:11px;color:#334155;margin-bottom:16px">${PROJECT.name}</div>`;
  const kgrid=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"16px"});
  [{l:"Budget",v:fmt(totB),c:"#38bdf8"},{l:"Paid",v:fmt(totP),c:"#22c55e"},{l:"Labour",v:fmt(totL),c:"#fb923c"},{l:"Progress",v:totPr+"%",c:"#a78bfa"}].forEach(x=>{ const k=div({background:"#07090f",borderRadius:"8px",padding:"10px 12px"}); k.innerHTML=`<div style="font-size:10px;color:#334155;margin-bottom:2px;text-transform:uppercase">${x.l}</div><div style="font-size:16px;font-weight:700;color:${x.c}">${x.v}</div>`; kgrid.appendChild(k); });
  box.appendChild(kgrid);
  const content=el("div",{style:{fontSize:"13px",color:"#cbd5e1",lineHeight:"1.9",whiteSpace:"pre-wrap"}},["Click 'Generate Report' to get your AI briefing."]);
  box.appendChild(content);
  const genBtn=btn("🤖 Generate Report","#7c1d1d","#fca5a5",async()=>{
    content.textContent="Analyzing…"; genBtn.disabled=true;
    const sum=TASKS.map(t=>{ const s=DATA.tasks[t.id],b=s.budget; return DATA.names[t.id]+"["+t.priority+"]:"+s.status+"("+s.progress+"%)B:"+fmtM(b.total)+"P:"+fmtM(b.paid); }).join("\n");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,system:"Senior construction PM briefing luxury home Lahore. Structured emoji-rich actionable.",messages:[{role:"user",content:"Project:"+PROJECT.name+"\nBudget:PKR"+fmtM(totB)+" Paid:PKR"+fmtM(totP)+" Labour:PKR"+fmtM(totL)+"\n\n"+sum+"\n\n1.📊 Health 2.🔴 Urgent 3.✅ Top 3 TODAY 4.💰 Finance 5.📅 Timeline"}]})});
      const d=await r.json(); content.textContent=d.error?"⚠️ "+d.error.message:d.content?.map(c=>c.text||"").join("")||"No response.";
    }catch(e){ content.textContent="⚠️ "+e.message; }
    genBtn.disabled=false;
  },{marginTop:"16px",width:"100%",padding:"10px"});
  box.appendChild(genBtn);
  root.appendChild(box);
  return root;
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
(async()=>{
  // show loading
  const app=document.getElementById("app");
  app.innerHTML=`<div style="min-height:100vh;background:#07090f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:48px">🏡</div><div style="font-size:18px;color:#f1f5f9;font-weight:700">Valencia 116-D</div><div style="font-size:13px;color:#475569">Loading project data…</div><div class="spin"></div></div>`;
  // load data
  const saved=await dbLoad();
  DATA=mergeData(saved);
  // render login
  render();
})();
</script>
